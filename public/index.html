<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>{{ASSISTANT_NAME}}</title>
<style>
  :root { --bg:#fbf7f0; --ink:#2b2622; --me:#ffe6b3; --pi:#ffffff; --accent:#e8843c; --soft:#9a8f84; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink);
    font:18px/1.5 ui-rounded,"SF Pro Rounded",system-ui,-apple-system,Segoe UI,sans-serif;
    display:flex; flex-direction:column; height:100dvh; }
  header { padding:18px 20px 12px; text-align:center; }
  header .dot { width:46px;height:46px;border-radius:50%;margin:0 auto 8px;
    background:radial-gradient(circle at 35% 30%, #ffd28a, var(--accent)); box-shadow:0 6px 18px rgba(232,132,60,.35); }
  header h1 { margin:0; font-size:22px; font-weight:700; }
  header p { margin:2px 0 0; color:var(--soft); font-size:15px; }
  #log { flex:1; overflow-y:auto; padding:8px 16px 4px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:80%; padding:12px 16px; border-radius:20px; white-space:pre-wrap; word-wrap:break-word;
    box-shadow:0 1px 2px rgba(0,0,0,.05); animation:rise .18s ease-out; }
  .me { align-self:flex-end; background:var(--me); border-bottom-right-radius:6px; }
  .pi { align-self:flex-start; background:var(--pi); border-bottom-left-radius:6px; }
  .typing { color:var(--soft); font-style:italic; }
  @keyframes rise { from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  form { display:flex; gap:8px; padding:12px 14px calc(12px + env(safe-area-inset-bottom)); background:var(--bg); }
  #box { flex:1; font-size:18px; padding:14px 16px; border:2px solid #efe2d2; border-radius:24px;
    background:#fff; outline:none; }
  #box:focus { border-color:var(--accent); }
  button { border:none; border-radius:50%; width:52px; height:52px; font-size:22px; cursor:pointer;
    background:var(--accent); color:#fff; flex:0 0 auto; }
  button:active { transform:scale(.94); }
  #mic { background:#fff; color:var(--accent); border:2px solid #efe2d2; }
  #mic.on { background:var(--accent); color:#fff; }
  @media (max-width:380px){ body{font-size:17px} }
</style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>{{ASSISTANT_NAME}}</h1>
    <p>Your friendly helper — ask me anything 💛</p>
  </header>
  <div id="log"></div>
  <form id="f">
    <button type="button" id="mic" title="Speak">🎤</button>
    <input id="box" autocomplete="off" placeholder="Type a message…" />
    <button type="submit" title="Send">➤</button>
  </form>
<script>
  const log = document.getElementById('log'), box = document.getElementById('box'), f = document.getElementById('f');
  const NAME = "{{ASSISTANT_NAME}}";
  let sessionId = localStorage.getItem('pi_sid');
  if (!sessionId) { sessionId = Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('pi_sid', sessionId); }

  function bubble(text, who) {
    const d = document.createElement('div');
    d.className = 'msg ' + who; d.textContent = text;
    log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
  }
  bubble("Hi, I'm " + NAME + "! What can I help you with today?", 'pi');

  async function send(text) {
    bubble(text, 'me');
    const t = bubble('…', 'pi'); t.classList.add('typing');
    try {
      const r = await fetch('/api/chat', { method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({ message:text, sessionId }) });
      const data = await r.json();
      t.classList.remove('typing');
      t.textContent = data.reply || data.error || 'Sorry, please try again.';
    } catch { t.classList.remove('typing'); t.textContent = "I couldn't connect — please try again."; }
    log.scrollTop = log.scrollHeight;
  }

  f.addEventListener('submit', (e) => { e.preventDefault();
    const v = box.value.trim(); if (!v) return; box.value=''; send(v); });

  // Voice input (graceful if unsupported)
  const mic = document.getElementById('mic');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    const rec = new SR(); rec.lang='en-US'; rec.interimResults=false;
    mic.addEventListener('click', () => { try { rec.start(); mic.classList.add('on'); } catch {} });
    rec.onresult = (e) => { box.value = e.results[0][0].transcript; mic.classList.remove('on'); box.focus(); };
    rec.onend = () => mic.classList.remove('on');
    rec.onerror = () => mic.classList.remove('on');
  } else { mic.style.display='none'; }
</script>
</body>
</html>
